<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stress Watch Dashboard</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glow-normal: rgba(0, 255, 204, 0.5);
            /* cyan/green */
            --glow-alert: rgba(255, 51, 51, 0.7);
            /* red */
            --text-main: #ffffff;
            --text-secondary: #aaaaaa;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at center, #020249 0%, #0f0f1a 50%, #05050a 100%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
            background-attachment: fixed;
        }

        /* Cosmic stars background effect */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image:
                radial-gradient(1px 1px at 20px 30px, #ffffff 100%, transparent),
                radial-gradient(1px 1px at 40px 70px, rgba(255, 255, 255, 0.8) 100%, transparent),
                radial-gradient(2px 2px at 90px 40px, rgba(255, 255, 255, 0.6) 100%, transparent),
                radial-gradient(2px 2px at 160px 120px, rgba(255, 255, 255, 0.4) 100%, transparent);
            background-repeat: repeat;
            background-size: 200px 200px;
            z-index: -1;
            opacity: 0.5;
        }

        .container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        header {
            width: 100%;
            text-align: center;
            margin-bottom: 10px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .status {
            font-size: 0.9rem;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #ff3333;
            box-shadow: 0 0 8px #ff3333;
            transition: all 0.3s ease;
        }

        .status-dot.connected {
            background-color: #00ffcc;
            box-shadow: 0 0 8px #00ffcc;
        }

        button {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 12px 24px;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            margin-top: 10px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .alert-banner {
            width: 100%;
            background: rgba(255, 51, 51, 0.2);
            border: 1px solid rgba(255, 51, 51, 0.5);
            color: #ffcccc;
            text-align: center;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            letter-spacing: 1px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.5s ease;
            transform: translateY(-10px);
            box-sizing: border-box;
            box-shadow: 0 0 20px rgba(255, 51, 51, 0.3);
            margin-bottom: -10px;
        }

        .alert-banner.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
            animation: pulse-banner 2s infinite;
        }

        @keyframes pulse-banner {
            0% {
                box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
            }

            50% {
                box-shadow: 0 0 25px rgba(255, 51, 51, 0.6);
            }

            100% {
                box-shadow: 0 0 10px rgba(255, 51, 51, 0.3);
            }
        }

        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
            transition: all 0.5s ease;
        }

        .main-module {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            border-radius: 50%;
            width: 250px;
            height: 250px;
            margin: 20px 0;
            box-shadow: 0 0 30px var(--glow-normal), inset 0 0 20px rgba(0, 255, 204, 0.2);
            border: 1px solid rgba(0, 255, 204, 0.3);
            position: relative;
        }

        .main-module.alert {
            box-shadow: 0 0 40px var(--glow-alert), inset 0 0 30px rgba(255, 51, 51, 0.3);
            border: 1px solid rgba(255, 51, 51, 0.5);
            animation: pulse-main 1.5s infinite;
        }

        @keyframes pulse-main {
            0% {
                box-shadow: 0 0 30px var(--glow-alert), inset 0 0 20px rgba(255, 51, 51, 0.2);
            }

            50% {
                box-shadow: 0 0 60px var(--glow-alert), inset 0 0 40px rgba(255, 51, 51, 0.4);
            }

            100% {
                box-shadow: 0 0 30px var(--glow-alert), inset 0 0 20px rgba(255, 51, 51, 0.2);
            }
        }

        .score-value {
            font-size: 5rem;
            font-weight: 700;
            line-height: 1;
            margin: 0;
            background: linear-gradient(135deg, #ffffff 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .main-module.alert .score-value {
            background: linear-gradient(135deg, #ffffff 0%, #ff9999 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .score-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-top: 10px;
        }

        .level-text {
            font-size: 1.2rem;
            font-weight: 300;
            margin-top: 10px;
            letter-spacing: 1px;
            color: #00ffcc;
        }

        .main-module.alert .level-text {
            color: #ff6666;
            font-weight: 500;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            width: 100%;
        }

        .metric-card {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metric-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .metric-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 1.8rem;
            font-weight: 600;
            display: flex;
            align-items: baseline;
            gap: 5px;
        }

        .metric-unit {
            font-size: 0.8rem;
            font-weight: 300;
            color: var(--text-secondary);
        }

        .icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Floating animation for cards */
        .floating {
            animation: float 6s ease-in-out infinite;
        }

        .floating:nth-child(2) {
            animation-delay: -2s;
        }

        .floating:nth-child(3) {
            animation-delay: -4s;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        /* Responsive grid for larger screens */
        @media (min-width: 600px) {
            .metrics-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .metric-card {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .icon {
                align-self: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <h1>Stress Watch</h1>
            <div class="status">
                <div class="status-dot" id="statusDot"></div>
                <span id="statusText">Disconnected</span>
            </div>
            <button id="connectBtn">Connect Device</button>
        </header>

        <div class="alert-banner" id="alertBanner">
            ⚠️ HIGH STRESS ALERT ⚠️
        </div>

        <div class="glass-card main-module floating" id="mainModule">
            <div class="score-value" id="scoreValue">--</div>
            <div class="score-label">Stress Score</div>
            <div class="level-text" id="levelText">Waiting...</div>
        </div>

        <div class="metrics-grid">
            <div class="glass-card metric-card floating">
                <div class="icon">❤️</div>
                <div class="metric-info">
                    <span class="metric-name">Heart Rate</span>
                    <div class="metric-value">
                        <span id="bpmValue">--</span>
                        <span class="metric-unit">BPM</span>
                    </div>
                </div>
            </div>

            <div class="glass-card metric-card floating">
                <div class="icon">🩸</div>
                <div class="metric-info">
                    <span class="metric-name">SpO2</span>
                    <div class="metric-value">
                        <span id="spo2Value">--</span>
                        <span class="metric-unit">%</span>
                    </div>
                </div>
            </div>

            <div class="glass-card metric-card floating">
                <div class="icon">⚡</div>
                <div class="metric-info">
                    <span class="metric-name">GSR</span>
                    <div class="metric-value">
                        <span id="gsrValue">--</span>
                        <span class="metric-unit">Ω</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const PRIMARY_SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';

        let bluetoothDevice;

        const connectBtn = document.getElementById('connectBtn');
        const statusText = document.getElementById('statusText');
        const statusDot = document.getElementById('statusDot');

        const mainModule = document.getElementById('mainModule');
        const alertBanner = document.getElementById('alertBanner');

        const scoreValue = document.getElementById('scoreValue');
        const levelText = document.getElementById('levelText');
        const bpmValue = document.getElementById('bpmValue');
        const spo2Value = document.getElementById('spo2Value');
        const gsrValue = document.getElementById('gsrValue');

        connectBtn.addEventListener('click', async () => {
            if (bluetoothDevice && bluetoothDevice.gatt.connected) {
                disconnect();
            } else {
                await connect();
            }
        });

        async function connect() {
            try {
                updateStatus('Requesting Device...', false);

                bluetoothDevice = await navigator.bluetooth.requestDevice({
                    filters: [{ services: [PRIMARY_SERVICE_UUID] }]
                });

                bluetoothDevice.addEventListener('gattserverdisconnected', onDisconnected);

                updateStatus('Connecting...', false);
                const server = await bluetoothDevice.gatt.connect();

                updateStatus('Getting Service...', false);
                const service = await server.getPrimaryService(PRIMARY_SERVICE_UUID);

                updateStatus('Getting Characteristic...', false);
                const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

                updateStatus('Starting Notifications...', false);
                await characteristic.startNotifications();
                characteristic.addEventListener('characteristicvaluechanged', handleCharacteristicValueChanged);

                updateStatus('Connected', true);
                connectBtn.textContent = 'Disconnect';

            } catch (error) {
                console.error('Connection failed!', error);
                updateStatus('Connection Failed', false);
            }
        }

        function disconnect() {
            if (!bluetoothDevice) {
                return;
            }
            if (bluetoothDevice.gatt.connected) {
                bluetoothDevice.gatt.disconnect();
            } else {
                updateStatus('Disconnected', false);
            }
        }

        function onDisconnected() {
            updateStatus('Disconnected', false);
            connectBtn.textContent = 'Connect Device';
            resetUI();
        }

        function updateStatus(text, isConnected) {
            statusText.textContent = text;
            if (isConnected) {
                statusDot.classList.add('connected');
            } else {
                statusDot.classList.remove('connected');
            }
        }

        function handleCharacteristicValueChanged(event) {
            const value = event.target.value;
            const decoder = new TextDecoder('utf-8');
            const dataString = decoder.decode(value);

            try {
                const data = JSON.parse(dataString);
                updateDashboard(data);
            } catch (e) {
                console.error('Error parsing JSON:', e, dataString);
            }
        }

        function updateDashboard(data) {
            if (data.score !== undefined) scoreValue.textContent = data.score;
            if (data.level !== undefined) levelText.textContent = data.level;
            if (data.bpm !== undefined) bpmValue.textContent = data.bpm;
            if (data.spo2 !== undefined) spo2Value.textContent = data.spo2;
            if (data.gsr !== undefined) gsrValue.textContent = data.gsr;

            // Alert logic with a threshold of > 75
            if (data.score > 75) {
                mainModule.classList.add('alert');
                alertBanner.classList.add('show');
            } else {
                mainModule.classList.remove('alert');
                alertBanner.classList.remove('show');
            }
        }

        function resetUI() {
            scoreValue.textContent = '--';
            levelText.textContent = 'Waiting...';
            bpmValue.textContent = '--';
            spo2Value.textContent = '--';
            gsrValue.textContent = '--';
            mainModule.classList.remove('alert');
            alertBanner.classList.remove('show');
        }
    </script>
</body>

</html>
