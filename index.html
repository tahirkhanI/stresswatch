<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mind Pulse - Dynamic Stress Watch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap');

        :root {
            --safe-green: #3cff95;
            --warn-yellow: #f0ff3c;
            --alert-red: #ff3c3c;
            --active-color: var(--safe-green); /* Default dynamic color */
            --bg-dark: #030308;
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--bg-dark); color: #ffffff;
            font-family: 'Inter', sans-serif; margin: 0; padding: 0;
            overflow-x: hidden; min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
        }

        .cosmic-bg {
            background: 
                radial-gradient(circle at 15% 0%, rgba(45, 20, 85, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 85% 80%, rgba(10, 40, 80, 0.4) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(5, 5, 16, 1) 0%, rgba(3, 3, 8, 1) 100%);
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; z-index: -1;
        }

        .app-container {
            width: 100%; max-width: 400px; height: 100vh; max-height: 850px;
            display: flex; flex-direction: column; padding: 24px; box-sizing: border-box;
            overflow-y: auto; position: relative;
        }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border); border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4); transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 32px; }
        h1 { font-family: 'Space Grotesk', sans-serif; font-size: 14px; letter-spacing: 0.15em; font-weight: 700; }

        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.3); }
        .status-dot.connected { background: var(--safe-green); box-shadow: 0 0 10px var(--safe-green); }

        .main-module { display: flex; justify-content: center; align-items: center; margin-bottom: 32px; }
        .score-circle { width: 240px; height: 240px; border-radius: 50%; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; }
        
        .progress-ring-circle { 
            transition: stroke-dashoffset 0.5s ease-out, stroke 0.8s ease; 
            transform-origin: 50% 50%; 
            stroke: var(--active-color);
            filter: drop-shadow(0 0 12px var(--active-color));
        }

        .score-value { 
            font-family: 'Space Grotesk', sans-serif; font-size: 72px; font-weight: 700; 
            color: var(--active-color); transition: color 0.8s ease, text-shadow 0.8s ease;
            text-shadow: 0 0 20px var(--active-color);
        }
        .score-label { font-size: 12px; text-transform: uppercase; letter-spacing: 0.2em; color: rgba(255,255,255,0.7); margin-top: 8px; }

        .alert-banner {
            background: rgba(255, 40, 60, 0.15); border: 1px solid rgba(255, 40, 60, 0.4); border-radius: 16px;
            padding: 16px; display: none; align-items: center; gap: 12px; margin-bottom: 24px;
        }
        .alert-banner.active { display: flex; animation: pulseRed 2s infinite; }
        @keyframes pulseRed { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .data-modules { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
        .data-card { padding: 20px; display: flex; align-items: center; gap: 16px; }
        .data-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-size: 18px; background: rgba(255,255,255,0.05); }

        .connect-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: white;
            padding: 18px; border-radius: 16px; font-size: 13px; letter-spacing: 0.1em;
            cursor: pointer; backdrop-filter: blur(10px); width: 100%; transition: 0.3s;
        }
    </style>
</head>
<body>
    <div class="cosmic-bg"></div>

    <div class="app-container" id="app">
        <header>
            <h1>MIND PULSE</h1>
            <div class="status-indicator">
                <span id="statusText">Disconnected</span>
                <div class="status-dot" id="statusDot"></div>
            </div>
        </header>

        <div class="main-module">
            <div class="glass-panel score-circle">
                <svg width="240" height="240" style="position: absolute; transform: rotate(-90deg);">
                    <circle cx="120" cy="120" r="110" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"></circle>
                    <circle class="progress-ring-circle" id="progressRing" cx="120" cy="120" r="110" fill="none" stroke-width="8" stroke-linecap="round"></circle>
                </svg>
                <div class="score-value" id="scoreValue">--</div>
                <div class="score-label" id="scoreLabel">OFFLINE</div>
            </div>
        </div>

        <div class="alert-banner" id="alertBanner">
            <div class="alert-icon">⚠️</div>
            <div class="alert-text">
                <h3>STRESS SPIKE DETECTED</h3>
                <p>Breath slowly: 4s In, 4s Out.</p>
            </div>
        </div>

        <div class="data-modules">
            <div class="glass-panel data-card"><div class="data-icon">❤️</div><div class="data-info"><p>BPM</p><div class="value" id="bpmValue">--</div></div></div>
            <div class="glass-panel data-card"><div class="data-icon">💨</div><div class="data-info"><p>SPO2</p><div class="value" id="spo2Value">--</div></div></div>
            <div class="glass-panel data-card"><div class="data-icon">⚡</div><div class="data-info"><p>GSR</p><div class="value" id="gsrValue">--</div></div></div>
        </div>

        <button class="connect-btn" id="connectBtn">PAIR VIA BLUETOOTH</button>
    </div>

    <script>
        const SERVICE_UUID = '4fafc201-1fb5-459e-8fcc-c5c9c331914b';
        const CHARACTERISTIC_UUID = 'beb5483e-36e1-4688-b7f5-ea07361b26a8';
        const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        
        let bluetoothDevice;
        const circle = document.getElementById('progressRing');
        const circumference = 110 * 2 * Math.PI;
        circle.style.strokeDasharray = `${circumference} ${circumference}`;

        // Function for triple beep
        async function playTripleBeep() {
            for (let i = 0; i < 3; i++) {
                alertSound.currentTime = 0;
                await alertSound.play();
                await new Promise(r => setTimeout(r, 250)); // Wait 250ms between beeps
            }
        }

        document.getElementById('connectBtn').addEventListener('click', async () => {
            alertSound.play().then(() => { alertSound.pause(); });
            if (Notification.permission !== 'granted') await Notification.requestPermission();

            try {
                bluetoothDevice = await navigator.bluetooth.requestDevice({ filters: [{ services: [SERVICE_UUID] }] });
                const server = await bluetoothDevice.gatt.connect();
                const service = await server.getPrimaryService(SERVICE_UUID);
                const char = await service.getCharacteristic(CHARACTERISTIC_UUID);
                
                await char.startNotifications();
                char.addEventListener('characteristicvaluechanged', (e) => {
                    const data = JSON.parse(new TextDecoder().decode(e.target.value));
                    updateDashboard(data);
                });

                document.getElementById('statusText').textContent = "Live";
                document.getElementById('statusDot').classList.add('connected');
                document.getElementById('connectBtn').style.display = "none";
            } catch (err) { console.log(err); }
        });

        function updateDashboard(data) {
            const score = data.score;
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('bpmValue').textContent = data.bpm;
            document.getElementById('spo2Value').textContent = data.spo2;
            document.getElementById('gsrValue').textContent = data.gsr;

            // DYNAMIC COLORS
            let color;
            let levelText;

            if (score <= 40) {
                color = "#3cff95"; // Green
                levelText = "Calm";
            } else if (score <= 75) {
                color = "#f0ff3c"; // Yellow
                levelText = "Moderate";
            } else {
                color = "#ff3c3c"; // Red
                levelText = "High Stress";
            }

            // Apply colors to UI
            document.documentElement.style.setProperty('--active-color', color);
            document.getElementById('scoreLabel').textContent = levelText;
            
            // Progress Ring
            const offset = circumference - (score / 100) * circumference;
            circle.style.strokeDashoffset = offset;

            // Handle High Stress Alerts
            if (score > 75) {
                document.getElementById('alertBanner').classList.add('active');
                playTripleBeep(); // Trigger the triple beep
                if (Notification.permission === 'granted') {
                    new Notification("STRESS SPIKE", { body: "Your levels are high. Time for a break.", tag: 'stress' });
                }
            } else {
                document.getElementById('alertBanner').classList.remove('active');
            }
        }
    </script>
</body>
</html>
